name: Deploy Web SPA

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'feat/web-spa-prototype'
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy aimani-gs-web-spa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Web SPA
        run: pnpm --filter @aimani-gs/web-spa typecheck

      - name: Build Web SPA
        run: pnpm --filter @aimani-gs/web-spa build

      - name: Deploy Web SPA
        working-directory: apps/web-spa
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy
