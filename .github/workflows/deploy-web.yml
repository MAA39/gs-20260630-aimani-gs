name: Deploy Web Worker

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'spike/web-direct-auth-2'
        type: string
      confirm_production_deploy:
        description: 'Set true to deploy aimani-gs-web. Leave false for validation only.'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate Web Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      - name: Build Web Worker package
        run: pnpm --filter @aimani-gs/web build

  deploy:
    name: Deploy aimani-gs-web
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.confirm_production_deploy == true }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      - name: Build Web Worker package
        run: pnpm --filter @aimani-gs/web build

      - name: Deploy Web Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
